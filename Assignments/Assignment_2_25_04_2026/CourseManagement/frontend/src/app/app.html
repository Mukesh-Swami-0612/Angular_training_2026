<div class="container">
  <header class="header">
    <h1>Course Management</h1>
    <p>Beautifully manage and explore your learning materials.</p>
  </header>

  <div class="main-content">
    
    <!-- Left Side: Form -->
    <div class="card form-section">
      <h2 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Add New Course
      </h2>
      
      <form (ngSubmit)="onSubmit()" #courseForm="ngForm">
        <div class="form-group">
          <label for="title" class="form-label">Course Title</label>
          <input 
            type="text" 
            id="title" 
            name="title" 
            class="form-control" 
            [(ngModel)]="newCourse.title" 
            required 
            placeholder="e.g. Introduction to Angular"
            #title="ngModel">
        </div>

        <div class="form-group">
          <label for="description" class="form-label">Description</label>
          <textarea 
            id="description" 
            name="description" 
            class="form-control" 
            [(ngModel)]="newCourse.description" 
            required 
            placeholder="What will students learn in this course?"
            #description="ngModel"></textarea>
        </div>

        <div class="form-group">
          <label for="duration" class="form-label">Duration (in hours)</label>
          <input 
            type="number" 
            id="duration" 
            name="duration" 
            class="form-control" 
            [(ngModel)]="newCourse.duration" 
            required 
            min="1"
            #duration="ngModel">
        </div>

        <button 
          type="submit" 
          class="btn-primary" 
          [disabled]="!courseForm.form.valid || isSubmitting()">
          <span *ngIf="isSubmitting()" class="spinner"></span>
          {{ isSubmitting() ? 'Adding Course...' : 'Publish Course' }}
        </button>
      </form>
    </div>

    <!-- Right Side: Course List -->
    <div class="card list-section">
      <h2 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--primary-color);"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
        Available Courses
      </h2>

      <div class="course-list" *ngIf="courses().length > 0; else emptyState">
        <div class="course-item" *ngFor="let course of courses()">
          <div style="display: flex; justify-content: space-between; align-items: start;">
            <div style="flex: 1;">
              <h3 class="course-name">{{ course.title }}</h3>
              <p class="course-desc">{{ course.description }}</p>
              <span style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; display: block;">
                ⏱️ {{ course.duration }} hours
              </span>
            </div>
            <button 
              type="button" 
              (click)="deleteCourse(course.id)"
              style="background-color: #ef4444; color: white; border: none; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; min-width: 80px; white-space: nowrap; margin-left: 1rem;"
              class="btn-delete"
              title="Delete this course">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 0.25rem; vertical-align: text-bottom;">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
              Delete
            </button>
          </div>
        </div>
      </div>

      <ng-template #emptyState>
        <div class="empty-state">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
          <h3>No courses yet</h3>
          <p>Be the first to add a course using the form!</p>
        </div>
      </ng-template>
    </div>

  </div>
</div>

<router-outlet />
