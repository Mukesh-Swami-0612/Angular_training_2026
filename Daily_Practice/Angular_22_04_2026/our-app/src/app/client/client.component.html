<div class="container mt-3">
  <h4 class="text-center bg-info text-white p-2">Client Dashboard</h4>

  <div class="row mt-4">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5>Statistics</h5>
        </div>
        <div class="card-body">
          <p><strong>Total Jobs Available:</strong> {{ jobs.length }}</p>
          <p><strong>Saved Jobs:</strong> {{ savedJobs.length }}</p>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-success text-white">
          <h5>Quick Actions</h5>
        </div>
        <div class="card-body">
          <a routerLink="/" class="btn btn-primary btn-block mb-2 d-block">Browse Jobs</a>
          <a routerLink="/saved" class="btn btn-success btn-block d-block">View Saved Jobs</a>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4">
    <h5>Recent Jobs</h5>
    <ul class="list-group">
      <li class="list-group-item" *ngFor="let j of jobs.slice(0, 3)">
        {{ j.title }} - {{ j.company }}
        <a [routerLink]="['/job', j.id]" class="btn btn-sm btn-outline-primary float-end">View</a>
      </li>
    </ul>
  </div>
</div>
