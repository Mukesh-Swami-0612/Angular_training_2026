<div class="container mt-3">

  <h4 class="text-center bg-success-subtle text-success p-2">
    Saved  Jobs
  </h4>
  <ul class="list-group">
    <li class="list-group-item" *ngFor="let j of savedJobs">
      {{ j.title }} - {{ j.company }} - {{ j.exp }}
      <br>
      <a [routerLink]="['/job', j.id]" class="btn btn-sm btn-primary mt-2">
        View Details
      </a>
    </li>
  </ul>

  <div *ngIf="savedJobs.length === 0" class="alert alert-info mt-3">
    No saved jobs yet. Browse jobs and save your favorites!
  </div>

</div>
