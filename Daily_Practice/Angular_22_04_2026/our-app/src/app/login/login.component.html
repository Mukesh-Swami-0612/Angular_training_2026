<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card">
        <div class="card-header bg-primary text-white text-center">
          <h4>Login</h4>
        </div>
        <div class="card-body">
          <form (ngSubmit)="login()">
            
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" [(ngModel)]="username" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="userpassword" [(ngModel)]="userpassword" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>

          <div *ngIf="msg" class="mt-3 alert" [ngClass]="{'alert-success': msg === 'Login successful!', 'alert-danger': msg === 'Invalid credentials'}">
            {{ msg }}
          </div>

          <div class="mt-3 text-center">
            <small class="text-muted">Demo: mukeshswami / mukesh0612</small>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
