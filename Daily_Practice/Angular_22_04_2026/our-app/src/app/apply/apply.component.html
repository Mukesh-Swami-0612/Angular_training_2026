<div class="container mt-3">
  <h4 class="text-center bg-primary text-white p-2">Apply for Job</h4>

  <div class="card mt-3" *ngIf="job">
    <div class="card-body">
      <h5 class="card-title">{{ job.title }}</h5>
      <p class="card-text">
        <strong>Company:</strong> {{ job.company }}<br>
        <strong>Experience:</strong> {{ job.exp }}
      </p>
    </div>
  </div>

  <form (ngSubmit)="submitApplication()" class="mt-4">
    <div class="mb-3">
      <label class="form-label">Full Name *</label>
      <input type="text" class="form-control" [(ngModel)]="applicantName" name="name" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Email *</label>
      <input type="email" class="form-control" [(ngModel)]="applicantEmail" name="email" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Phone *</label>
      <input type="tel" class="form-control" [(ngModel)]="applicantPhone" name="phone" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Cover Letter</label>
      <textarea class="form-control" rows="4" [(ngModel)]="coverLetter" name="coverLetter"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Submit Application</button>
    <a [routerLink]="['/job', job?.id]" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
