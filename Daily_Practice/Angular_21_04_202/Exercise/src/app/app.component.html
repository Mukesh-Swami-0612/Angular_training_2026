<div class="container mt-4">

  <h1 class="text-center bg-primary text-white p-2">
    Parent Component
  </h1>

  <label>Enter Your Name:</label>
  <input type="text"
         class="form-control"
         [(ngModel)]="userName">

  <br>

  <app-child
    [userName]="userName"
    (greetingEvent)="receiveGreeting($event)">
  </app-child>

  <h3 class="mt-3 text-success text-center">
    Greeting Received: {{ messageFromChild }}
  </h3>

</div>
