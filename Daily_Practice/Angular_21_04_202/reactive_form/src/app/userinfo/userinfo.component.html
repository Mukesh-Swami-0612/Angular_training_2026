<div class="container mt-4">

  <h2 class="text-center text-primary">Reactive Form</h2>

  <form [formGroup]="userform" (ngSubmit)="onSubmit()">

    <!-- Username -->
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input type="text" class="form-control" formControlName="username">

      <small class="text-danger"
        *ngIf="userform.get('username')?.invalid && userform.get('username')?.touched">
        Username is required
      </small>
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="useremail">

      <small class="text-danger"
        *ngIf="userform.get('useremail')?.invalid && userform.get('useremail')?.touched">
        Enter valid email
      </small>
    </div>

    <!-- Password -->
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" formControlName="userpassword">

      <small class="text-danger"
        *ngIf="userform.get('userpassword')?.invalid && userform.get('userpassword')?.touched">
        Password must be 6–10 characters
      </small>
    </div>

    <button class="btn btn-primary w-100" type="submit"
            [disabled]="userform.invalid">
      Submit
    </button>

  </form>

</div>
